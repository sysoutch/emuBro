<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>emuBro Community</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d0f1b;
      --bg-elev: #171b2a;
      --text: #f3f6ff;
      --muted: #9ea8be;
      --accent: #c2193d;
      --border: rgba(255, 255, 255, 0.14);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Segoe UI, system-ui, sans-serif;
    }
    .shell {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: min(640px, 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--bg-elev);
      padding: 16px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.1rem;
    }
    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.4;
    }
    .url {
      word-break: break-all;
      color: #fff;
      margin-bottom: 12px;
      font-size: 0.92rem;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .btn {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--text);
      text-decoration: none;
      padding: 7px 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn.primary {
      border-color: color-mix(in srgb, var(--accent), white 14%);
      background: color-mix(in srgb, var(--accent), transparent 72%);
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <h1>Opening Community Page</h1>
      <p>If this page does not load in-app, use your browser fallback.</p>
      <div id="target-url" class="url">Preparing...</div>
      <div id="fallback-actions" class="row hidden">
        <a id="open-external" class="btn primary" target="_blank" rel="noopener noreferrer">Open in Browser</a>
        <button id="close-window" class="btn" type="button">Close</button>
      </div>
    </section>
  </main>
  <script>
    (function () {
      const targetLabel = document.getElementById('target-url');
      const fallbackActions = document.getElementById('fallback-actions');
      const openExternal = document.getElementById('open-external');
      const closeBtn = document.getElementById('close-window');
      const params = new URLSearchParams(window.location.search || '');
      const target = String(params.get('target') || '').trim();

      const showFallback = (message) => {
        if (targetLabel) targetLabel.textContent = message || target || 'Invalid community URL';
        if (openExternal && target) openExternal.href = target;
        fallbackActions?.classList.remove('hidden');
      };

      if (!target || !/^https?:\/\//i.test(target)) {
        showFallback('Invalid target URL');
        return;
      }

      if (targetLabel) targetLabel.textContent = target;
      if (openExternal) openExternal.href = target;

      closeBtn?.addEventListener('click', () => {
        try { window.close(); } catch (_error) {}
      });

      setTimeout(() => {
        try {
          window.location.replace(target);
        } catch (_error) {
          showFallback(target);
        }
      }, 120);

      setTimeout(() => {
        const stillOnBridgePage = String(window.location.href || '').toLowerCase().includes('community-window.html');
        if (stillOnBridgePage) showFallback(target);
      }, 2800);
    })();
  </script>
</body>
</html>
