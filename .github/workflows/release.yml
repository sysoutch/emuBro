name: Build emuBro Packages

on:
  push:
    tags:
      - "v*"
      - "*-alpha*"
  workflow_dispatch:

concurrency:
  group: tauri-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 20

jobs:
  bundle:
    name: Bundle (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            bundles: "nsis,msi"
            artifact_paths: |
              tauri/src-tauri/target/release/bundle/nsis/*.exe
              tauri/src-tauri/target/release/bundle/nsis/*.zip
              tauri/src-tauri/target/release/bundle/msi/*.msi
              tauri/src-tauri/target/release/bundle/msi/*.zip
              tauri/src-tauri/target/release/bundle/portable/*.zip
          - name: linux-appimage
            os: ubuntu-latest
            bundles: "appimage"
            artifact_paths: |
              tauri/src-tauri/target/release/bundle/appimage/*.AppImage
              tauri/src-tauri/target/release/bundle/appimage/*.tar.gz
            experimental_appimage: true
          - name: linux-deb
            os: ubuntu-latest
            bundles: "deb"
            artifact_paths: |
              tauri/src-tauri/target/release/bundle/deb/*.deb
              tauri/src-tauri/target/release/bundle/deb/*.tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev libjavascriptcoregtk-4.0-dev
          fi

      - name: Sync emuBro resources
        run: npm run sync:resources

      - name: Install root JS dependencies
        timeout-minutes: 20
        run: npm install --no-audit --prefer-offline --no-fund

      - name: Install Tauri JS dependencies (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 20
        run: npm --prefix tauri install --no-audit --prefer-offline --include=optional --no-fund

      - name: Install Tauri JS dependencies (non-Windows)
        if: runner.os != 'Windows'
        timeout-minutes: 20
        run: npm --prefix tauri install --no-audit --prefer-offline --include=optional --no-fund

      - name: Build legacy renderer bundle
        run: npm run legacy:build

      - name: Sync bundled resources
        run: npm run sync:bundle-resources

      - name: Build Tauri bundles
        if: runner.os == 'Linux' && matrix.experimental_appimage != true
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Linux bundle attempt ${attempt}/3"
            if npm --prefix tauri run tauri:build -- --bundles ${{ matrix.bundles }}; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Linux bundle failed after ${attempt} attempts"
              exit 1
            fi
            echo "Linux bundle failed, cleaning partial AppImage output before retry"
            rm -rf tauri/src-tauri/target/release/bundle/appimage
            sleep 15
          done

      - name: Build portable AppImage bundle
        if: runner.os == 'Linux' && matrix.experimental_appimage == true
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Portable AppImage bundle attempt ${attempt}/3"
            if npm run build:linux:appimage; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Portable AppImage bundle failed after ${attempt} attempts"
              exit 1
            fi
            echo "Portable AppImage bundle failed, cleaning partial output before retry"
            rm -rf .cache/tauri-portable-appimage-cli
            rm -rf tauri/src-tauri/target/release/bundle/appimage
            sleep 15
          done

      - name: Build Tauri bundles (Windows prerelease)
        if: runner.os == 'Windows' && contains(github.ref_name, '-alpha.')
        run: npm --prefix tauri run tauri:build -- --bundles nsis

      - name: Build Tauri bundles (Windows stable)
        if: runner.os == 'Windows' && !contains(github.ref_name, '-alpha.')
        run: npm --prefix tauri run tauri:build -- --bundles ${{ matrix.bundles }}

      - name: Build portable Windows package folder
        if: runner.os == 'Windows'
        run: node scripts/build-windows-portable.js

      - name: Archive portable Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $portableRoot = "tauri/src-tauri/target/release/bundle/portable"
          $portableDir = Get-ChildItem -Path $portableRoot -Directory | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $portableDir) {
            throw "Portable package directory not found in $portableRoot"
          }
          $zipPath = Join-Path $portableDir.Parent.FullName ($portableDir.Name + ".zip")
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $portableDir.FullName "*") -DestinationPath $zipPath
          Write-Host "Portable archive: $zipPath"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emubro-${{ matrix.name }}-bundles
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: warn

  flatpak:
    name: Flatpak (linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Install Linux host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev libjavascriptcoregtk-4.0-dev
          fi

      - name: Sync emuBro resources
        run: npm run sync:resources

      - name: Install root JS dependencies
        timeout-minutes: 20
        run: npm install --no-audit --prefer-offline --no-fund

      - name: Install Tauri JS dependencies (Linux)
        timeout-minutes: 20
        run: npm --prefix tauri install --no-audit --prefer-offline --include=optional --no-fund

      - name: Build legacy renderer bundle
        run: npm run legacy:build

      - name: Sync bundled resources
        run: npm run sync:bundle-resources

      - name: Build Flatpak bundle
        run: npm run build:linux:flatpak

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: emubro-flatpak
          path: build/flatpak/emuBro.flatpak

  publish-release:
    name: Publish GitHub Release Assets
    if: startsWith(github.ref, 'refs/tags/') && needs.bundle.result == 'success' && needs.flatpak.result == 'success'
    needs:
      - bundle
      - flatpak
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: emubro-*
          path: release-assets
          merge-multiple: true

      - name: Show release files
        run: |
          ls -la release-assets
          find release-assets -type f | sort

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "${{ github.ref_name }}" --repo "$GH_REPO" >/dev/null 2>&1 || gh release create "${{ github.ref_name }}" --repo "$GH_REPO" --title "${{ github.ref_name }}" --generate-notes

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          mapfile -t FILES < <(find release-assets -type f | sort)
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No release assets found to upload."
            exit 1
          fi
          gh release upload "${{ github.ref_name }}" "${FILES[@]}" --repo "$GH_REPO" --clobber
