name: Build emuBro Packages

on:
  push:
    tags:
      - "v*"
      - "*-alpha*"
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 20

jobs:
  bundle:
    name: Bundle (${{ matrix.name }})
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            bundles: "nsis,msi"
            artifact_paths: |
              desktop/src-tauri/target/release/bundle/nsis/*.exe
              desktop/src-tauri/target/release/bundle/nsis/*.zip
              desktop/src-tauri/target/release/bundle/msi/*.msi
              desktop/src-tauri/target/release/bundle/msi/*.zip
              desktop/src-tauri/target/release/bundle/portable/*.zip
          - name: linux-appimage
            os: ubuntu-latest
            bundles: "appimage"
            artifact_paths: |
              desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              desktop/src-tauri/target/release/bundle/appimage/*.tar.gz
            experimental_appimage: true
          - name: linux-deb
            os: ubuntu-latest
            bundles: "deb"
            artifact_paths: |
              desktop/src-tauri/target/release/bundle/deb/*.deb
              desktop/src-tauri/target/release/bundle/deb/*.tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev libjavascriptcoregtk-4.0-dev
          fi

      - name: Sync emuBro resources
        run: npm run sync:resources

      - name: Install root JS dependencies
        timeout-minutes: 20
        run: npm install --no-audit --prefer-offline --no-fund

      - name: Install desktop shell JS dependencies (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 20
        run: npm --prefix desktop install --no-audit --prefer-offline --include=optional --no-fund

      - name: Install desktop shell JS dependencies (non-Windows)
        if: runner.os != 'Windows'
        timeout-minutes: 20
        run: npm --prefix desktop install --no-audit --prefer-offline --include=optional --no-fund

      - name: Build legacy renderer bundle
        run: npm run legacy:build

      - name: Sync bundled resources
        run: npm run sync:bundle-resources

      - name: Build desktop shell bundles
        if: runner.os == 'Linux' && matrix.experimental_appimage != true
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Linux bundle attempt ${attempt}/3"
            if npm --prefix desktop run desktop:build -- --bundles ${{ matrix.bundles }}; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Linux bundle failed after ${attempt} attempts"
              exit 1
            fi
            echo "Linux bundle failed, cleaning partial AppImage output before retry"
            rm -rf desktop/src-tauri/target/release/bundle/appimage
            sleep 15
          done

      - name: Build portable AppImage bundle
        if: runner.os == 'Linux' && matrix.experimental_appimage == true
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            echo "Portable AppImage bundle attempt ${attempt}/3"
            if npm run build:linux:appimage; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Portable AppImage bundle failed after ${attempt} attempts"
              exit 1
            fi
            echo "Portable AppImage bundle failed, cleaning partial output before retry"
            rm -rf .cache/desktop-portable-appimage-cli
            rm -rf desktop/src-tauri/target/release/bundle/appimage
            sleep 15
          done

      - name: Build desktop shell bundles (Windows prerelease)
        if: runner.os == 'Windows' && contains(github.ref_name, '-alpha.')
        run: npm --prefix desktop run desktop:build -- --bundles nsis

      - name: Build desktop shell bundles (Windows stable)
        if: runner.os == 'Windows' && !contains(github.ref_name, '-alpha.')
        run: npm --prefix desktop run desktop:build -- --bundles ${{ matrix.bundles }}

      - name: Build portable Windows package folder
        if: runner.os == 'Windows'
        run: node scripts/build-windows-portable.js

      - name: Archive portable Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $portableRoot = "desktop/src-tauri/target/release/bundle/portable"
          $portableDir = Get-ChildItem -Path $portableRoot -Directory | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $portableDir) {
            throw "Portable package directory not found in $portableRoot"
          }
          $zipPath = Join-Path $portableDir.Parent.FullName ($portableDir.Name + ".zip")
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $portableDir.FullName "*") -DestinationPath $zipPath
          Write-Host "Portable archive: $zipPath"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emubro-${{ matrix.name }}-bundles
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: warn

      - name: Publish bundle assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --repo "$GH_REPO" --title "$RELEASE_TAG" --generate-notes || true
          fi

          mapfile -t PATTERNS <<'EOF'
          ${{ matrix.artifact_paths }}
          EOF

          FILES=()
          for pattern in "${PATTERNS[@]}"; do
            pattern="${pattern#"${pattern%%[![:space:]]*}"}"
            pattern="${pattern%"${pattern##*[![:space:]]}"}"
            if [ -z "$pattern" ]; then
              continue
            fi
            shopt -s nullglob
            for file in $pattern; do
              if [ -f "$file" ]; then
                FILES+=("$file")
              fi
            done
            shopt -u nullglob
          done

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No bundle files found for release upload in matrix '${{ matrix.name }}'."
            exit 1
          fi

          for attempt in 1 2 3; do
            echo "Upload attempt ${attempt}/3 for matrix '${{ matrix.name }}'"
            if gh release upload "$RELEASE_TAG" "${FILES[@]}" --repo "$GH_REPO" --clobber; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to upload release assets after ${attempt} attempts."
              exit 1
            fi
            sleep 10
          done

  flatpak:
    name: Flatpak (linux)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Install Linux host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev libjavascriptcoregtk-4.0-dev
          fi

      - name: Sync emuBro resources
        run: npm run sync:resources

      - name: Install root JS dependencies
        timeout-minutes: 20
        run: npm install --no-audit --prefer-offline --no-fund

      - name: Install desktop shell JS dependencies (Linux)
        timeout-minutes: 20
        run: npm --prefix desktop install --no-audit --prefer-offline --include=optional --no-fund

      - name: Build legacy renderer bundle
        run: npm run legacy:build

      - name: Sync bundled resources
        run: npm run sync:bundle-resources

      - name: Build Flatpak bundle
        run: npm run build:linux:flatpak

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: emubro-flatpak
          path: build/flatpak/emuBro.flatpak

      - name: Publish Flatpak asset to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          FILE="build/flatpak/emuBro.flatpak"
          if [ ! -f "$FILE" ]; then
            echo "Flatpak artifact missing: $FILE"
            exit 1
          fi

          if ! gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --repo "$GH_REPO" --title "$RELEASE_TAG" --generate-notes || true
          fi

          for attempt in 1 2 3; do
            echo "Flatpak upload attempt ${attempt}/3"
            if gh release upload "$RELEASE_TAG" "$FILE" --repo "$GH_REPO" --clobber; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "Failed to upload Flatpak asset after ${attempt} attempts."
              exit 1
            fi
            sleep 10
          done

