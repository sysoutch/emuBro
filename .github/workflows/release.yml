name: Build emuBro Packages

on:
  push:
    tags:
      - "v*"
      - "*-alpha*"
  workflow_dispatch:

concurrency:
  group: tauri-release-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 22

jobs:
  bundle:
    name: Bundle (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            bundles: "nsis,msi"
          - name: linux
            os: ubuntu-latest
            bundles: "appimage,deb"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            sudo apt-get install -y libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev
          else
            sudo apt-get install -y libwebkit2gtk-4.0-dev libjavascriptcoregtk-4.0-dev
          fi

      - name: Install JS dependencies
        run: |
          npm install --no-audit --prefer-offline
          npm --prefix tauri install --no-audit --prefer-offline

      - name: Build Tauri bundles
        run: npm --prefix tauri run tauri:build -- --bundles ${{ matrix.bundles }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: emubro-${{ matrix.name }}-bundles
          path: |
            tauri/src-tauri/target/release/bundle/**

  flatpak:
    name: Flatpak (linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Flatpak tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y flathub org.freedesktop.Platform//24.08 org.freedesktop.Sdk//24.08

      - name: Install JS dependencies
        run: |
          npm install --no-audit --prefer-offline
          npm --prefix tauri install --no-audit --prefer-offline

      - name: Build Flatpak bundle
        run: npm run build:linux:flatpak

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: emubro-flatpak
          path: build/flatpak/emuBro.flatpak

  publish-release:
    name: Publish GitHub Release Assets
    if: startsWith(github.ref, 'refs/tags/') && always()
    needs:
      - bundle
      - flatpak
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: emubro-*
          path: release-assets
          merge-multiple: true

      - name: Show release files
        run: |
          ls -la release-assets
          find release-assets -type f | sort

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release-assets/**
